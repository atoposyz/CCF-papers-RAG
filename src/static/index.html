<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCF Papers Hybrid RAG</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Markdown 渲染支持 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    <div class="background-blob blob-3"></div>

    <header class="glass-header">
        <div class="logo">
            <span class="logo-icon">🔍</span>
            <h1>CCF RAG Explorer</h1>
        </div>
        <div class="api-config">
            <input type="password" id="api-key" placeholder="OpenAI / DeepSeek API Key">
            <input type="text" id="api-base" placeholder="Base URL (e.g. api.deepseek.com/v1)"
                value="https://api.deepseek.com/v1">
            <input type="text" id="model-name" placeholder="Model Name" value="deepseek-chat">
        </div>
    </header>

    <main class="dashboard">
        <!-- 左侧面板：检索控制 -->
        <section class="search-panel glass-card">
            <div class="panel-header">
                <h2>Hybrid Search Engine</h2>
                <button class="icon-btn" id="toggle-settings" title="Toggle Search Options">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </button>
            </div>

            <div id="settings-container">
                <form id="search-form" class="search-form compact">
                    <div class="search-row">
                        <input type="text" id="query-input" placeholder="Enter keywords or natural language query..."
                            required>
                        <button type="submit" class="primary-btn search-submit-btn" id="search-btn">
                            <span>Search</span>
                            <div class="spinner" id="search-spinner" style="display: none;"></div>
                        </button>
                    </div>

                    <div class="filters-row">
                        <div class="filter-item">
                            <label>Venue</label>
                            <input type="text" id="venue-input" placeholder="dac, icse">
                        </div>
                        <div class="filter-item">
                            <label>Year</label>
                            <input type="text" id="year-input" placeholder="2024">
                        </div>
                        <div class="filter-item">
                            <label>TopK</label>
                            <input type="number" id="topk-input" value="5" min="1" max="20">
                        </div>
                    </div>

                    <!-- 混合检索权重配置 (精简版) -->
                    <div class="weight-config-compact">
                        <div class="weight-slider-row">
                            <span class="weight-tag vector-tag">🧠 Vector</span>
                            <input type="range" id="vector-weight" min="0" max="100" value="70" class="weight-slider">
                            <span class="weight-tag bm25-tag">🔤 BM25</span>
                        </div>
                        <div class="weight-hint-row">
                            <span id="weight-hint">Vector 70% · BM25 30%</span>
                        </div>
                    </div>
                </form>
            </div>

            <div class="search-results" id="results-container">
                <div class="placeholder-text">
                    <p>Enter a query to search the CCF paper database.</p>
                </div>
            </div>
        </section>

        <!-- 右侧面板：AI RAG 会话 -->
        <section class="chat-panel glass-card">
            <div class="chat-header">
                <h2>RAG Assistant</h2>
                <button class="icon-btn" id="clear-chat-btn" title="Clear Conversation">🗑️</button>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message ai-message">
                    <div class="message-content">
                        Hello! I am your AI assistant. Search for papers on the left, and then ask me questions about
                        them here!
                    </div>
                </div>
            </div>

            <form id="chat-form" class="chat-input-wrapper">
                <textarea id="chat-input" placeholder="Ask a question about the retrieved papers..." rows="2"
                    required></textarea>
                <button type="submit" class="send-btn" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </section>
    </main>

    <!-- 弹窗提示 -->
    <div id="toast" class="toast">Message</div>

    <script src="app.js"></script>
</body>

</html>
